name: Keep Supabase Alive
on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at Midnight
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit Keepalive Endpoint
        run: curl -f -X GET https://platform.your-domain.com/api/keepalive || echo "Could not hit keepalive endpoint..."
