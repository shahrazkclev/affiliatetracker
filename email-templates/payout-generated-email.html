<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payout Processed - Cleverpoly Affiliates</title>
</head>
<body style="margin:0;padding:0;background-color:#09090b;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#09090b">
    <tr>
      <td align="center" style="padding:48px 16px;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;">
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <div style="background:#ea580c;width:56px;height:56px;border-radius:16px;text-align:center;line-height:56px;color:#fff;font-size:26px;font-weight:800;margin:0 auto;">C</div>
              <div style="margin-top:14px;font-size:13px;font-weight:700;letter-spacing:0.1em;color:#52525b;text-transform:uppercase;">Cleverpoly Affiliates</div>
            </td>
          </tr>
          <tr>
            <td style="border-radius:20px;overflow:hidden;border:1px solid #27272a;background:#111113;padding:48px 40px;">
              <div style="display:inline-block;background:#312e81;border:1px solid #3730a3;border-radius:100px;padding:5px 14px;margin-bottom:22px;">
                <span style="font-size:11px;font-weight:600;color:#818cf8;letter-spacing:0.06em;text-transform:uppercase;">Payout Sent 💸</span>
              </div>
              <h1 style="margin:0 0 16px;font-size:28px;font-weight:800;line-height:1.2;color:#fafafa;">Your payout is on the way!</h1>
              <p style="margin:0 0 24px;font-size:16px;line-height:1.7;color:#71717a;">Hi {{ .AffiliateName }}, we've just processed your latest payout. It should arrive in your payout account shortly.</p>
              
              <div style="background:#18181b;border:1px solid #27272a;border-radius:12px;padding:20px;margin-bottom:32px;text-align:center;">
                <p style="margin:0 0 8px;font-size:13px;color:#a1a1aa;text-transform:uppercase;letter-spacing:0.05em;font-weight:600;">Payout Amount</p>
                <p style="margin:0;font-size:36px;color:#a5b4fc;font-weight:800;">${{ .Amount }}</p>
              </div>

              <a href="https://affiliates.cleverpoly.store" style="display:inline-block;padding:16px 40px;font-size:15px;font-weight:700;color:#ffffff;background:#ea580c;text-decoration:none;border-radius:10px;">View Payouts</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
